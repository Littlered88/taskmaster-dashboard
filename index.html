<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="assets/taskmaster_icon.png">
    <title>Taskmaster Dashboard</title>
  </head>
  <body>
    <div id="splash-screen" class="splash-overlay">
      <div class="splash-content">
        <img
          src="assets/taskmaster_splash.png"
          alt="Taskmaster"
          class="splash-image"
          onerror="this.style.display = 'none'"
        />
        <label class="splash-checkbox-label">
          <input type="checkbox" id="splash-dont-show" />
          Don't show this again
        </label>
        <button id="splash-continue-btn" class="btn-action splash-continue-btn">Begin Your Adventure</button>
      </div>
    </div>
    <div class="dashboard-layout">
      <nav class="sidebar">
        <div class="sidebar-header">
          <img
            src="assets/taskmaster_icon.png"
            alt="Taskmaster"
            class="sidebar-logo-icon"
            onerror="this.style.display = 'none'"
          />
          <img
            src="assets/taskmaster_wordmark.png"
            alt="Taskmaster"
            class="sidebar-logo-wordmark"
            onerror="
              this.outerHTML =
                '<h2 style=\'margin:0;color:var(--text-main);font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;\'>Taskmaster</h2>'
            "
          />
        </div>
        <ul class="nav-menu">
          <li class="nav-item active" data-target="view-tasks">📜 Tasks</li>
          <li class="nav-item" data-target="view-shop">💰 Shop</li>
          <li class="nav-item" data-target="view-stats">🏆 Stats</li>
        </ul>
      </nav>

      <main class="main-content">
        <div class="content-container">
          <section id="view-tasks" class="view-section active" data-view-src="views/tasks.html"></section>

          <section id="view-shop" class="view-section" data-view-src="views/shop.html"></section>

          <section id="view-stats" class="view-section" data-view-src="views/stats.html"></section>
        </div>
      </main>
    </div>

    <div id="task-modal" class="modal-overlay" onclick="closeTaskDetails(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="modal-title-group">
            <img id="modal-icon" src="" alt="Task Icon" class="task-icon" />
            <h3 id="modal-title">Task Name</h3>
          </div>
          <button class="btn-close" onclick="closeTaskDetails()">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-tags">
            <span id="modal-region" class="meta-tag">Region</span>
            <span id="modal-tier" class="meta-tag">Tier</span>
          </div>
          <p id="modal-desc" class="modal-description">Task description goes here...</p>

          <div id="modal-progress-container" class="modal-progress-container"></div>

          <div id="modal-requirements" class="modal-requirements"></div>
        </div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
